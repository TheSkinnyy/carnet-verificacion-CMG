<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Verificador de Carnet - Contraloría Municipal de Guanare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #082158 0%, #04102e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: #082158;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px 25px;
        }
        
        .foto-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .foto-carnet {
            width: 140px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            border: 4px solid #082158;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            background-color: #f0f0f0;
        }
        
        .foto-placeholder {
            width: 140px;
            height: 160px;
            border-radius: 12px;
            border: 4px solid #082158;
            background: linear-gradient(135deg, #e0e0e0 0%, #cccccc 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 0.8rem;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        
        .foto-placeholder span {
            font-size: 3rem;
            margin-bottom: 8px;
        }
        
        .cargando, .error, .no-encontrado {
            text-align: center;
            padding: 40px 20px;
        }
        
        .cargando {
            color: #082158;
        }
        
        .error {
            color: #dc3545;
        }
        
        .no-encontrado {
            color: #856404;
            background: #fff3cd;
            border-radius: 10px;
        }
        
        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 5px 0;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .info-row {
            padding: 12px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .label {
            font-weight: bold;
            width: 100px;
            color: #082158;
        }
        
        .value {
            flex: 1;
            color: #333;
        }
        
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 2px solid #082158;
        }
        
        .footer-logo {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .footer-text {
            font-size: 0.8rem;
            color: #555;
            font-weight: 500;
        }
        
        .footer-small {
            font-size: 0.7rem;
            color: #888;
            margin-top: 8px;
        }
        
        .badge {
            display: inline-block;
            background: #082158;
            color: white;
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 15px;
            font-weight: bold;
        }

        .qr-note {
            background: #e8f0fe;
            border-radius: 10px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid #082158;
        }

        .qr-note p {
            font-size: 0.7rem;
            color: #082158;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ Contraloría Municipal de Guanare</h1>
            <p>Sistema de Verificación de Funcionarios</p>
        </div>
        
        <div class="content" id="contenido">
            <div class="cargando">
                <p>🔍 Cargando información del funcionario...</p>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-logo">
                📜
            </div>
            <div class="footer-text">
                Documento de verificación oficial
            </div>
            <div class="footer-small">
                Este carnet es propiedad de la Contraloría Municipal de Guanare.<br>
                Su uso es exclusivo del funcionario titular.
            </div>
        </div>
    </div>

    <script>
        function obtenerIdDeURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function mostrarFoto(funcionario) {
            if (funcionario.foto && funcionario.foto !== "") {
                return `<div class="foto-container">
                            <img src="${funcionario.foto}" alt="Foto de ${funcionario.nombre}" class="foto-carnet" onerror="this.onerror=null; this.src=''; this.parentElement.innerHTML= '<div class=\'foto-container\'><div class=\'foto-placeholder\'><span>📷</span><br>Sin foto</div></div>'">
                        </div>`;
            } else {
                return `<div class="foto-container">
                            <div class="foto-placeholder">
                                <span>📷</span>
                                <br>Sin foto
                            </div>
                        </div>`;
            }
        }

        async function cargarInformacion() {
            const idFuncionario = obtenerIdDeURL();
            const contenedor = document.getElementById('contenido');
            
            if (!idFuncionario) {
                contenedor.innerHTML = `
                    <div class="error">
                        <p>❌ No se ha especificado un código de funcionario válido.</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Por favor, escanee el código QR de su carnet.</p>
                        <div class="qr-note">
                            <p>🔒 Verificación segura · Código institucional</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            try {
                const respuesta = await fetch('funcionarios.json');
                
                if (!respuesta.ok) {
                    throw new Error('No se pudo cargar la base de datos');
                }
                
                const funcionarios = await respuesta.json();
                const funcionario = funcionarios.find(f => f.id === idFuncionario);
                
                if (!funcionario) {
                    contenedor.innerHTML = `
                        <div class="no-encontrado">
                            <p>⚠️ Funcionario no encontrado</p>
                            <p style="font-size: 0.85rem; margin-top: 10px;">El código ${idFuncionario} no corresponde a ningún funcionario registrado.</p>
                            <div class="qr-note">
                                <p>📞 Comuníquese con la oficina de personal para más información</p>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                contenedor.innerHTML = `
                    ${mostrarFoto(funcionario)}
                    <div class="info-card">
                        <div class="info-row">
                            <div class="label">👤 Nombre:</div>
                            <div class="value"><strong>${funcionario.nombre}</strong></div>
                        </div>
                        <div class="info-row">
                            <div class="label">🆔 Cédula:</div>
                            <div class="value">${funcionario.cedula}</div>
                        </div>
                        <div class="info-row">
                            <div class="label">📋 Cargo:</div>
                            <div class="value">${funcionario.cargo}</div>
                        </div>
                        <div class="info-row">
                            <div class="label">🏢 Dependencia:</div>
                            <div class="value">${funcionario.dependencia || 'No especificada'}</div>
                        </div>
                        <div class="info-row">
                            <div class="label">📝 Descripción:</div>
                            <div class="value">${funcionario.descripcion || 'Sin descripción'}</div>
                        </div>
                        <div style="text-align: center;">
                            <span class="badge">✓ Documento válido</span>
                        </div>
                        <div class="qr-note">
                            <p>🔐 Verificación en línea · Datos actualizados</p>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error:', error);
                contenedor.innerHTML = `
                    <div class="error">
                        <p>❌ Error al cargar la información</p>
                        <p style="font-size: 0.85rem;">Por favor, intente más tarde o verifique su conexión.</p>
                        <div class="qr-note">
                            <p>🔄 Si el problema persiste, contacte al área de sistemas</p>
                        </div>
                    </div>
                `;
            }
        }
        
        cargarInformacion();
    </script>
</body>
</html>
